<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>入座 - 茶叶溯源系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        :root {
            /* 真正的高级新中式色卡 (与大厅绝对统一) */
            --tea-bg: #F9F8F4;
            --tea-primary: #4A5D4E;     /* 松石绿：主色调 */
            --tea-dark: #2C362F;        /* 墨黑：主标题 */
            --tea-accent: #8C634A;      /* 沉香棕 */
            --tea-border: #E8E5DF;
            --tea-text-main: #4A4A4A;
            --tea-text-sub: #888888;
            --tea-bg-start: #eef3ec;    /* 渐变起：极浅绿 */
            --tea-bg-end: #dce7d7;      /* 渐变止：豆沙绿 */

            /* 暴力覆盖 Element Plus 的原生色彩体系 */
            --el-color-primary: var(--tea-primary) !important;
            --el-color-success: #5c7a65 !important;
            --el-text-color-primary: var(--tea-dark) !important;
            --el-border-radius-base: 4px !important; /* 偏硬朗的中式边角 */
        }

        body {
            margin: 0;
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
            /* 全局淡绿色渐变背景 */
            background: linear-gradient(135deg, var(--tea-bg-start) 0%, var(--tea-bg-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--tea-text-main);
        }

        /* 注入中式灵魂：衬线字体专用类 */
        .serif-text {
            font-family: "Noto Serif SC", "Songti SC", "STZhongsong", serif;
            font-weight: 600;
        }

        /* 登录卡片：温润毛玻璃质感 */
        .login-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 45px 50px;
            border-radius: 8px;
            box-shadow: 0 12px 35px rgba(74, 93, 78, 0.1);
            width: 360px;
            text-align: center;
        }

        .title {
            color: var(--tea-dark);
            margin-bottom: 35px;
            font-size: 28px;
            letter-spacing: 4px;
        }

        .captcha-img {
            cursor: pointer;
            height: 38px;
            border-radius: 4px;
            border: 1px solid var(--tea-border);
            transition: 0.3s;
        }
        .captcha-img:hover { border-color: var(--tea-primary); }

        .submit-btn {
            width: 100%;
            margin-top: 15px;
            padding: 20px 0; /* 拉高按钮，增加呼吸感 */
            font-size: 16px;
            letter-spacing: 4px;
        }

        /* 深度定制 Element Plus 的 Tabs，去掉多余的蓝色 */
        .el-tabs__item { font-size: 16px; color: var(--tea-text-sub); }
        .el-tabs__item.is-active { color: var(--tea-primary) !important; font-weight: bold; }
        .el-tabs__active-bar { background-color: var(--tea-primary) !important; }
        .el-input__wrapper { box-shadow: 0 0 0 1px var(--tea-border) inset !important; background: transparent; }
        .el-input__wrapper:hover, .el-input__wrapper.is-focus { box-shadow: 0 0 0 1px var(--tea-primary) inset !important; }
    </style>
</head>
<body>
<div id="app">
    <div class="login-box">
        <div class="title serif-text">🍵 溯源系统</div>

        <el-tabs v-model="activeTab" stretch>
            <el-tab-pane label="雅客入座" name="login">
                <el-form :model="loginForm" style="margin-top: 25px;">
                    <el-form-item>
                        <el-input v-model="loginForm.username" placeholder="请输入名讳 (用户名)" size="large">
                            <template #prefix>👤</template>
                        </el-input>
                    </el-form-item>
                    <el-form-item>
                        <el-input v-model="loginForm.password" type="password" placeholder="请输入口令 (密码)" size="large" @keyup.enter="handleLogin">
                            <template #prefix>🔒</template>
                        </el-input>
                    </el-form-item>
                    <el-form-item>
                        <div style="display: flex; gap: 15px; width: 100%;">
                            <el-input v-model="loginForm.code" placeholder="验证码" size="large" @keyup.enter="handleLogin"></el-input>
                            <img :src="captchaUrl" @click="refreshCaptcha" class="captcha-img" title="点击更换">
                        </div>
                    </el-form-item>
                    <el-button type="primary" class="submit-btn serif-text" @click="handleLogin" :loading="loading">入 座</el-button>
                </el-form>
            </el-tab-pane>

            <el-tab-pane label="新客登记" name="register">
                <el-form :model="regForm" style="margin-top: 25px;">
                    <el-form-item>
                        <el-input v-model="regForm.username" placeholder="设置您的名讳" size="large"></el-input>
                    </el-form-item>
                    <el-form-item>
                        <el-input v-model="regForm.password" type="password" placeholder="设置防伪口令" size="large"></el-input>
                    </el-form-item>
                    <el-button type="success" class="submit-btn serif-text" @click="handleRegister" :loading="loading" style="background: #5c7a65; border: none;">登 记</el-button>
                </el-form>
            </el-tab-pane>
        </el-tabs>
    </div>
</div>

<script>
    const { createApp, ref } = Vue;
    createApp({
        setup() {
            const activeTab = ref('login');
            const loading = ref(false);
            const captchaUrl = ref('/api/auth/captcha?t=' + Date.now());
            const loginForm = ref({ username: '', password: '', code: '' });
            const regForm = ref({ username: '', password: '' });

            const refreshCaptcha = () => {
                captchaUrl.value = '/api/auth/captcha?t=' + Date.now();
            };

            const handleLogin = async () => {
                if(!loginForm.value.username || !loginForm.value.password || !loginForm.value.code) {
                    return ElementPlus.ElMessage.warning('请填写完整信息');
                }
                loading.value = true;
                try {
                    const res = await axios.post('/api/auth/login', loginForm.value);
                    localStorage.setItem('user', JSON.stringify(res.data.user));

                    ElementPlus.ElMessage.success('入座成功，正在为您备茶...');
                    setTimeout(() => location.href = 'index.html', 1000);
                } catch (err) {
                    let msg = '登录失败';
                    if (err.response && err.response.data && err.response.data.message) {
                        msg = err.response.data.message;
                    }
                    ElementPlus.ElMessage.error(msg);
                    refreshCaptcha();
                } finally {
                    loading.value = false;
                }
            };

            const handleRegister = async () => {
                if(!regForm.value.username || !regForm.value.password) {
                    return ElementPlus.ElMessage.warning('请填写完整信息');
                }
                loading.value = true;
                try {
                    const res = await axios.post('/api/auth/register', {
                        ...regForm.value,
                        role: 'USER'
                    });
                    if(res.data === 'SUCCESS') {
                        ElementPlus.ElMessage.success('登记成功，请入座');
                        activeTab.value = 'login';
                        loginForm.value.username = regForm.value.username;
                        regForm.value = { username: '', password: '' }; // 清空注册表单
                    } else {
                        ElementPlus.ElMessage.error(res.data);
                    }
                } catch (err) {
                    ElementPlus.ElMessage.error('网络异常，登记失败');
                } finally {
                    loading.value = false;
                }
            };

            return { activeTab, captchaUrl, loginForm, regForm, refreshCaptcha, handleLogin, handleRegister, loading };
        }
    }).use(ElementPlus).mount('#app');
</script>
</body>
</html>
