<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>茶文化馆 - 溯源系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        /* 引入刚刚定义的新中式全局变量 */
        :root {
            --tea-bg: #faf9f6; --tea-primary: #4a6353; --tea-dark: #2b3831;
            --tea-border: #e8e6e1; --tea-text-main: #333333; --tea-text-sub: #7a7a7a;
            --el-color-primary: var(--tea-primary);
            --el-color-primary-light-3: #6b8272;
            --el-color-primary-light-9: #eef2ef;
        }
        body { margin: 0; background-color: var(--tea-bg); font-family: "PingFang SC", "Helvetica Neue", sans-serif; }
        .serif-text { font-family: "Noto Serif SC", "Songti SC", serif; }

        /* 顶部导航：去掉深色背景，改为留白雅致风格 */
        .navbar {
            background: rgba(250, 249, 246, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--tea-border);
            padding: 1rem 3rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 999;
        }
        .nav-title { font-size: 22px; color: var(--tea-dark); letter-spacing: 2px; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        /* 文章卡片：宣纸质感，无厚重阴影 */
        .article-card {
            background: #ffffff;
            border: 1px solid var(--tea-border);
            border-radius: 4px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.02);
        }
        .article-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px 0 rgba(74, 99, 83, 0.08); /* 微微的绿阴影 */
            border-color: var(--tea-primary);
        }
        .article-content { padding: 30px; }
        .article-title { margin: 15px 0; color: var(--tea-dark); font-size: 24px; }
        .article-desc {
            color: var(--tea-text-sub); line-height: 1.8; font-size: 15px;
            overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
        }
        .meta { color: #a0a0a0; font-size: 13px; margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }

        /* 对话框阅读模式样式定制 */
        .el-dialog { border-radius: 8px !important; }
        .el-dialog__header { border-bottom: 1px dashed var(--tea-border); margin-right: 0; padding-bottom: 15px; }
        .el-dialog__title { font-family: "Noto Serif SC", "Songti SC", serif; font-size: 22px; font-weight: bold; color: var(--tea-dark); }
        .read-content { line-height: 2; font-size: 16px; color: var(--tea-text-main); white-space: pre-wrap; padding: 10px 20px; }
        .video-box { width: 100%; height: 400px; background: #000; margin-bottom: 25px; border-radius: 4px; overflow: hidden; }
    </style>
</head>
<body>
<div id="app">
    <nav class="navbar">
        <div class="nav-title serif-text">🍵 茶文化数字馆</div>
        <el-button link style="color: var(--tea-dark); font-size: 16px;" @click="location.href='index.html'">
            <span class="serif-text">返回首页</span>
        </el-button>
    </nav>

    <div class="container">
        <el-empty v-if="articles.length === 0" description="案上无书，请待主理人添置笔墨 (暂无内容)"></el-empty>

        <el-row :gutter="0">
            <el-col :span="24" v-for="item in articles" :key="item.id">
                <el-card shadow="never" class="article-card" @click="openArticle(item)">
                    <div class="article-content">
                        <el-tag size="small" effect="plain" round style="border-color: var(--tea-primary); color: var(--tea-primary);">
                            {{ item.category || '茶记' }}
                        </el-tag>
                        <h2 class="article-title serif-text">{{ item.title }}</h2>
                        <div class="article-desc">{{ item.content }}</div>
                        <div class="meta">
                            <span>发布于 · {{ item.createTime.split('T')[0] }}</span>
                            <span style="color: var(--tea-primary);">翻阅全文 →</span>
                        </div>
                    </div>
                </el-card>
            </el-col>
        </el-row>
    </div>

    <el-dialog v-model="dialogVisible" :title="currentArticle.title" width="65%" top="5vh">
        <div v-if="currentArticle.videoUrl" class="video-box">
            <iframe :src="currentArticle.videoUrl" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="read-content serif-text">{{ currentArticle.content }}</div>
    </el-dialog>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;
    createApp({
        setup() {
            const articles = ref([]);
            const dialogVisible = ref(false);
            const currentArticle = ref({});

            const loadData = async () => {
                try {
                    const res = await axios.get('/api/tea/culture/list');
                    articles.value = res.data;
                } catch (e) {
                    console.error("文化数据加载失败");
                }
            };

            const openArticle = (item) => {
                currentArticle.value = item;
                dialogVisible.value = true;
            };

            onMounted(loadData);
            return { articles, dialogVisible, currentArticle, openArticle };
        }
    }).use(ElementPlus).mount('#app');
</script>
</body>
</html>
